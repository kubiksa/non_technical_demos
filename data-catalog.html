<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carollo Data Asset Catalog</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2333;
    --border: #30363d;
    --accent: #2ea8a0;
    --accent2: #1a6b65;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --text-dim: #484f58;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --blue: #58a6ff;
    --purple: #bc8cff;
    --tag-bg: #1c2333;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(13,17,23,0.92);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }

  .logo-mark {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 500;
    font-size: 12px;
    color: #0d1117;
  }

  .header-meta {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
  }

  /* LAYOUT */
  .layout {
    display: grid;
    grid-template-columns: 260px 1fr 340px;
    height: calc(100vh - 60px);
  }

  /* SIDEBAR */
  .sidebar {
    border-right: 1px solid var(--border);
    padding: 24px 0;
    overflow-y: auto;
  }

  .sidebar-section {
    padding: 0 20px;
    margin-bottom: 28px;
  }

  .sidebar-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  .filter-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 8px 12px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    transition: all 0.15s;
    margin-bottom: 2px;
    text-align: left;
  }

  .filter-btn:hover { background: var(--surface2); color: var(--text); }
  .filter-btn.active { background: var(--accent2); color: var(--accent); }

  .filter-count {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    background: var(--surface2);
    padding: 2px 7px;
    border-radius: 10px;
    color: var(--text-dim);
  }

  .filter-btn.active .filter-count {
    background: rgba(46,168,160,0.2);
    color: var(--accent);
  }

  .class-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 8px;
    flex-shrink: 0;
  }

  /* MAIN */
  .main {
    overflow-y: auto;
    padding: 24px 28px;
  }

  .toolbar {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    align-items: center;
  }

  .search-wrap {
    flex: 1;
    position: relative;
  }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 14px;
  }

  input[type="text"] {
    width: 100%;
    padding: 9px 12px 9px 36px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--text-dim); }

  .results-meta {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 14px;
  }

  /* TABLE */
  .catalog-table {
    width: 100%;
    border-collapse: collapse;
  }

  .catalog-table th {
    text-align: left;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }

  .catalog-table th:hover { color: var(--text-muted); }

  .catalog-table tr.data-row {
    border-bottom: 1px solid rgba(48,54,61,0.5);
    cursor: pointer;
    transition: background 0.1s;
  }

  .catalog-table tr.data-row:hover { background: var(--surface); }
  .catalog-table tr.data-row.selected { background: rgba(46,168,160,0.08); border-left: 2px solid var(--accent); }

  .catalog-table td {
    padding: 10px 12px;
    vertical-align: middle;
  }

  .asset-name {
    font-weight: 500;
    color: var(--text);
    font-size: 13px;
  }

  .asset-system {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
    white-space: nowrap;
  }

  .badge-public { background: rgba(63,185,80,0.12); color: var(--green); }
  .badge-internal { background: rgba(88,166,255,0.12); color: var(--blue); }
  .badge-confidential { background: rgba(210,153,34,0.12); color: var(--yellow); }
  .badge-restricted { background: rgba(248,81,73,0.12); color: var(--red); }

  .category-tag {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 11px;
    background: var(--tag-bg);
    color: var(--text-muted);
    border: 1px solid var(--border);
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    display: inline-block;
  }

  .status-active { background: var(--green); box-shadow: 0 0 6px rgba(63,185,80,0.5); }
  .status-review { background: var(--yellow); }
  .status-inactive { background: var(--text-dim); }

  /* DETAIL PANEL */
  .detail-panel {
    border-left: 1px solid var(--border);
    overflow-y: auto;
    padding: 24px;
  }

  .detail-empty {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    gap: 12px;
    text-align: center;
  }

  .detail-empty-icon {
    font-size: 32px;
    opacity: 0.3;
  }

  .detail-header {
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .detail-name {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 6px;
    line-height: 1.3;
  }

  .detail-system {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  .detail-section {
    margin-bottom: 20px;
  }

  .detail-section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .detail-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 7px 0;
    border-bottom: 1px solid rgba(48,54,61,0.4);
    gap: 16px;
  }

  .detail-key {
    color: var(--text-muted);
    font-size: 12px;
    flex-shrink: 0;
  }

  .detail-val {
    font-size: 12px;
    text-align: right;
    font-family: 'DM Mono', monospace;
  }

  .compliance-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    background: var(--surface);
    border-radius: 6px;
    margin-bottom: 6px;
    font-size: 12px;
  }

  .compliance-check { color: var(--green); font-size: 13px; }
  .compliance-warn { color: var(--yellow); font-size: 13px; }

  .tags-wrap { display: flex; flex-wrap: wrap; gap: 6px; }

  .tag {
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 11px;
    background: var(--surface2);
    color: var(--text-muted);
    border: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .no-results {
    padding: 48px 0;
    text-align: center;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
  }
</style>
</head>

    </table>
    <div class="no-results" id="no-results" style="display:none">No assets match your search.</div>
  </main>

  <!-- DETAIL -->

    <div class="detail-empty">

</div>

    owner: "Engineering & Planning",
    updated: "Jan 2026",
    status: "review",
    regulatory: [],
    retention: "Permanent",
    description: "Multi-year capital project pipeline including project descriptions, cost estimates, funding sources, and priority rankings. Used for rate studies and bond financing.",
    fields: ["project_id","project_name","asset_category","est_cost","funding_source","planned_year","status","priority_score"],
    compliance: [
      { label: "Bond covenant documentation", status: "warn" },
      { label: "Rate study basis documented", status: "check" },
    ],
    tags: ["CIP","capital","planning","finance","rate-study"]
  },
  {
    id: 15,
    name: "Facility As-Built Drawings",
    system: "ProjectWise / SharePoint",
    category: "Asset Management",
    classification: "Public",
    owner: "Engineering Records",
    updated: "Mar 2026",
    status: "active",
    regulatory: [],
    retention: "Permanent",
    description: "Record drawings for all water and wastewater treatment facilities including electrical, mechanical, civil, and process diagrams.",
    fields: ["drawing_number","facility","discipline","revision","date","file_format","location_path"],
    compliance: [
      { label: "Drawing numbering standard applied", status: "check" },
      { label: "Version control maintained", status: "warn" },
    ],
    tags: ["drawings","engineering","records","CAD","as-built"]
  }
];

let currentFilter = { category: 'all', classification: null, regulatory: null };
let selectedId = null;

function setFilter(type, value) {
  // Reset other filters when clicking sidebar
  if (type === 'category') {
    currentFilter = { category: value, classification: null, regulatory: null };
  } else if (type === 'classification') {
    currentFilter = { category: 'all', classification: value, regulatory: null };
  } else {
    currentFilter = { category: 'all', classification: null, regulatory: value };
  }

  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');
  render();
}

function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase();
  return assets.filter(a => {
    const matchCat = currentFilter.category === 'all' || a.category === currentFilter.category;
    const matchClass = !currentFilter.classification || a.classification === currentFilter.classification;
    const matchReg = !currentFilter.regulatory || a.regulatory.includes(currentFilter.regulatory);
    const matchQ = !q || a.name.toLowerCase().includes(q) || a.system.toLowerCase().includes(q) ||
      a.owner.toLowerCase().includes(q) || a.category.toLowerCase().includes(q) ||
      a.classification.toLowerCase().includes(q) || a.tags.some(t => t.includes(q));
    return matchCat && matchClass && matchReg && matchQ;
  });
}

function classificationBadge(c) {
  const map = { Public: 'badge-public', Internal: 'badge-internal', Confidential: 'badge-confidential', Restricted: 'badge-restricted' };
  const icons = { Public: '○', Internal: '◑', Confidential: '●', Restricted: '⬤' };
  return `<span class="badge ${map[c]}">${icons[c]} ${c}</span>`;
}

function statusDot(s) {
  const map = { active: 'status-active', review: 'status-review', inactive: 'status-inactive' };
  const labels = { active: 'Active', review: 'In Review', inactive: 'Inactive' };
  return `<span style="display:flex;align-items:center;gap:6px;"><span class="status-dot ${map[s]}"></span><span style="color:var(--text-muted);font-size:12px;">${labels[s]}</span></span>`;
}

function categoryColor(c) {
  const map = { Operational: '#58a6ff', 'Water Quality': '#3fb950', 'Asset Management': '#bc8cff' };
  return map[c] || '#8b949e';
}

function render() {
  const filtered = getFiltered();
  const tbody = document.getElementById('table-body');
  const meta = document.getElementById('results-meta');
  const noRes = document.getElementById('no-results');

  meta.textContent = `${filtered.length} of ${assets.length} assets`;

  if (filtered.length === 0) {
    tbody.innerHTML = '';
    noRes.style.display = 'block';
    return;
  }
  noRes.style.display = 'none';

  tbody.innerHTML = filtered.map(a => `
    <tr class="data-row ${selectedId === a.id ? 'selected' : ''}" onclick="selectAsset(${a.id})">
      <td>
        <div class="asset-name">${a.name}</div>
        <div class="asset-system">${a.system}</div>
      </td>
      <td><span class="category-tag" style="border-color:${categoryColor(a.category)}22;color:${categoryColor(a.category)}">${a.category}</span></td>
      <td>${classificationBadge(a.classification)}</td>
      <td style="color:var(--text-muted);font-size:12px;">${a.owner}</td>
      <td style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim);">${a.updated}</td>
      <td>${statusDot(a.status)}</td>
    </tr>
  `).join('');
}

function selectAsset(id) {
  selectedId = id;
  const a = assets.find(x => x.id === id);
  render();

  const panel = document.getElementById('detail-panel');
  const complianceHTML = a.compliance.map(c => `
    <div class="compliance-item">
      <span class="${c.status === 'check' ? 'compliance-check' : 'compliance-warn'}">${c.status === 'check' ? '✓' : '⚠'}</span>
      <span>${c.label}</span>
    </div>
  `).join('');

  const tagsHTML = a.tags.map(t => `<span class="tag">${t}</span>`).join('');
  const fieldsHTML = a.fields.map(f => `<span class="tag">${f}</span>`).join('');

  panel.innerHTML = `
    <div class="detail-header">
      <div class="detail-name">${a.name}</div>
      <div class="detail-system">${a.system}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">${classificationBadge(a.classification)} ${statusDot(a.status)}</div>
    </div>

    <div class="detail-section">
      <div class="detail-section-label">Description</div>
      <div style="font-size:12px;color:var(--text-muted);line-height:1.6;">${a.description}</div>
    </div>

    <div class="detail-section">
      <div class="detail-section-label">Metadata</div>
      <div class="detail-row"><span class="detail-key">Category</span><span class="detail-val" style="color:${categoryColor(a.category)}">${a.category}</span></div>
      <div class="detail-row"><span class="detail-key">Owner</span><span class="detail-val">${a.owner}</span></div>
      <div class="detail-row"><span class="detail-key">System</span><span class="detail-val">${a.system}</span></div>
      <div class="detail-row"><span class="detail-key">Retention</span><span class="detail-val">${a.retention}</span></div>
      <div class="detail-row"><span class="detail-key">Last Updated</span><span class="detail-val">${a.updated}</span></div>
      ${a.regulatory.length ? `<div class="detail-row"><span class="detail-key">Regulatory</span><span class="detail-val">${a.regulatory.join(', ')}</span></div>` : ''}
    </div>

    <div class="detail-section">
      <div class="detail-section-label">Compliance Status</div>
      ${complianceHTML}
    </div>

    <div class="detail-section">
      <div class="detail-section-label">Known Fields</div>
      <div class="tags-wrap">${fieldsHTML}</div>
    </div>

    <div class="detail-section">
      <div class="detail-section-label">Tags</div>
      <div class="tags-wrap">${tagsHTML}</div>
    </div>
  `;
}

render();
</script>
</body>
</html>
